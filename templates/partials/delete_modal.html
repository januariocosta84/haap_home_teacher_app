<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-body text-center px-4 pt-4 pb-4">
        <div style="width:68px;height:68px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
          <i class="bi bi-trash3-fill" style="font-size:1.6rem;color:#dc2626;"></i>
        </div>
        <h5 class="fw-bold mb-1" id="deleteModalLabel">Konfirma Eliminasaun</h5>
        <p class="text-muted mb-4" style="font-size:.9rem;">
          Eliminar <strong id="deleteItemName" class="text-dark"></strong>?
          <br><span style="font-size:.82rem;">Aksaun ida ne'e la bele desfazer.</span>
        </p>
        <div class="d-flex gap-2 justify-content-center">
          <button type="button" class="btn btn-outline-secondary px-4 rounded-pill"
                  data-bs-dismiss="modal">Kanseladu</button>
          <form id="deleteForm" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4 rounded-pill">
              <i class="bi bi-trash me-1"></i>Eliminar
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
