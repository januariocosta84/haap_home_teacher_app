  <!--Alpine JS-->
  
    <script>
        // Login page phone validation (only runs if id_username exists)
        document.addEventListener('DOMContentLoaded', function() {
          const phoneInput = document.getElementById("id_username");
          if (!phoneInput) return;
          const errorDisplay = document.getElementById("phone-error");
          const submitButton = document.getElementById("submit-button");
          const phoneRegex = /^\+?[1-9]\d{1,14}$/;
          phoneInput.addEventListener("input", () => {
            const phone = phoneInput.value.trim();
            if (phone && !phoneRegex.test(phone)) {
              if (errorDisplay) { errorDisplay.textContent = "Laos numeru nebe validu."; errorDisplay.classList.remove("d-none"); }
              if (submitButton) submitButton.disabled = true;
              return;
            }
            if (errorDisplay) errorDisplay.classList.add("d-none");
            if (submitButton) submitButton.disabled = false;
          });
        });
      </script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const alerts = document.querySelectorAll('.alert');

    alerts.forEach(function(alert) {
        setTimeout(function() {
            alert.style.transition = "opacity 0.5s ease";
            alert.style.opacity = "0";

            setTimeout(() => {
                alert.remove();
            }, 500);
        }, 3000);
    });
});
</script>
</body>

</html>
