{% extends "./layout.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-sm border-0">

                <div class="card-body p-4">

                    <h4 class="fw-bold mb-3 text-center">
                        Verifika OTP
                    </h4>

                    <p class="text-muted text-center">
                        Favor hatama kode OTP ne'ebe haruka ba WhatsApp.
                    </p>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">

                        {% csrf_token %}

                        <input
                            type="text"
                            name="otp"
                            class="form-control"
                            placeholder="Hatama OTP"
                            required
                        >

                        <button
                            type="submit"
                            class="btn btn-primary w-100 mt-3"
                        >
                            Verifika OTP
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
