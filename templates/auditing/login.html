<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>HAAP Auditing — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous">
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,.5);
    }
    .login-header {
      background: linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 100%);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .login-shield {
      width: 60px; height: 60px;
      background: rgba(255,255,255,.15);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .login-body { padding: 2rem; }
    .form-control, .form-control:focus {
      background: #0f172a;
      border-color: #334155;
      color: #f1f5f9;
      border-radius: 10px;
    }
    .form-control::placeholder { color: #64748b; }
    .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.2); }
    .form-label { color: #94a3b8; font-size: .82rem; font-weight: 600; }
    .input-group-text {
      background: #0f172a;
      border-color: #334155;
      color: #64748b;
      border-radius: 10px 0 0 10px;
    }
    .btn-login {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .65rem 1.5rem;
      font-weight: 600;
      letter-spacing: .02em;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .92; color: #fff; }
    .badge-readonly {
      background: rgba(59,130,246,.15);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,.25);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: .68rem;
      font-weight: 600;
    }
    .divider { border-color: #334155; }
  </style>
</head>
<body>
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="login-shield">
        <i class="bi bi-shield-lock-fill text-white" style="font-size:1.8rem;"></i>
      </div>
      <h4 class="fw-bold text-white mb-1">HAAP Auditing Portal</h4>
      <p class="text-white opacity-75 small mb-0">Portál Monitorisasaun Seguransa</p>
    </div>

    <!-- Body -->
    <div class="login-body">

      <div class="text-center mb-4">
        <span class="badge-readonly">
          <i class="bi bi-eye-fill me-1"></i>Aksesu Haree De'it — Read Only
        </span>
      </div>

      {% if error %}
      <div class="alert border-0 mb-4 py-2 px-3"
           style="background:rgba(239,68,68,.12);color:#f87171;border-radius:10px;font-size:.84rem;">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post" action="">
        {% csrf_token %}

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Enderesu Email</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-envelope-fill" style="font-size:.9rem;"></i>
            </span>
            <input type="email" name="email" class="form-control border-start-0 ps-1"
                   placeholder="auditor@exemplo.com"
                   autocomplete="username" required
                   style="border-radius:0 10px 10px 0;">
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock-fill" style="font-size:.9rem;"></i>
            </span>
            <input type="password" name="password" id="passwordInput"
                   class="form-control border-start-0 border-end-0 ps-1"
                   placeholder="Hakerek password"
                   autocomplete="current-password" required
                   style="border-radius:0;">
            <button type="button" class="input-group-text"
                    style="border-radius:0 10px 10px 0;cursor:pointer;"
                    onclick="togglePwd()">
              <i class="bi bi-eye" id="pwdIcon" style="font-size:.9rem;"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100">
          <i class="bi bi-shield-lock me-2"></i>Login ba Auditing Portal
        </button>
      </form>

      <hr class="divider my-4">

      <p class="text-center mb-0" style="color:#475569;font-size:.78rem;">
        <i class="bi bi-info-circle me-1"></i>
        Portal ida ne'e ba auditor sira de'it. <br>
        Admin sira uza
        <a href="{% url 'core:login' %}" style="color:#3b82f6;text-decoration:none;">
          login pájina normal
        </a>.
      </p>

    </div>
  </div>

  <script>
  function togglePwd() {
    var inp  = document.getElementById('passwordInput');
    var icon = document.getElementById('pwdIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
  </script>
</body>
</html>
