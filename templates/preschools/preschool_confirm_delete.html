{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0" style="border-radius:12px;">
        <div class="card-body">

            <h4>Delete Pre-Escolar</h4>

            <p>Are you sure you want to delete:</p>
            <h5 class="text-danger">{{ object.name }}</h5>

            <form method="POST">
                {% csrf_token %}

                <button class="btn btn-danger">
                    Yes, Delete
                </button>

                <a href="{% url 'preschools:preschool_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>

        </div>
    </div>

</div>

{% endblock %}
