{% extends "core/base.html" %}


{% block title %}404 - Pajina La Hetan{% endblock %}

{% block content %}
<div class="container-fluid mt-4">

  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">

      <div class="card border shadow-sm text-center small-box-card" style="border-radius: 12px; overflow: hidden;">
        <div class="card-body p-5">

          <!-- Icon -->
          <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 64px;"></i>
          </div>

          <!-- Error Code -->
          <h1 class="fw-bold text-danger mb-2" style="font-size: 72px;">404</h1>

          <!-- Message -->
          <h4 class="fw-semibold mb-2">Pajina La Hetan</h4>
          <p class="text-muted mb-3">
            Deskulpa, pajina ne'ebé ita buka la iha ka move ba fatin seluk.
          </p>

          <!-- Countdown -->
          <p class="text-muted mb-4">
            Ita sei fila ba dashboard iha <strong><span id="countdown">5</span></strong> segundos...
          </p>

          <!-- Buttons -->
          <div class="d-flex justify-content-center gap-3 flex-wrap mb-4">
            <a href="{%url 'core:moe_admin_dashboard'}" class="btn btn-primary">
              <i class="bi bi-house-door-fill me-1"></i> Dashboard
            </a>

            <button onclick="history.back()" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i> Fila kotuk
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- Scripts -->
<script>
  // Countdown + Redirect
  let seconds = 5;
  const countdownEl = document.getElementById("countdown");

  const timer = setInterval(() => {
    seconds--;
    countdownEl.textContent = seconds;

    if (seconds <= 0) {
      clearInterval(timer);
      window.location.href = "{%url 'core:moe_admin_dashboard'%}";
    }
  }, 1000);
</script>

<!-- Hover Effect (same style as your dashboard cards) -->
<style>
  .small-box-card {
    transition: all 0.3s ease;
  }

  .small-box-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
</style>

{% endblock %}
